<!DOCTYPE html>
<html>
  <head>
    <title>Ecommerce Test</title>

    <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">

    <!-- Load a font called Roboto from Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Here are the CSS files for this page. -->
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/shared/ecommerce-test-header.css">
    <link rel="stylesheet" href="styles/pages/ecommerce-test.css">
  </head>
  <body>
    <div class="ecommerce-test-header">
      <div class="ecommerce-test-header-left-section">
        <a href="index.html" class="header-link">
          <svg class="site-logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="3" y1="6" x2="21" y2="6" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 10a4 4 0 01-8 0" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="site-logo-text">ecommerce<em>.test</em></span>
        </a>
      </div>

      <div class="ecommerce-test-header-middle-section">
        <input class="search-bar" type="text" placeholder="Search">

        <button class="search-button">
          <img class="search-icon" src="images/icons/search-icon.png">
        </button>
      </div>

      <div class="ecommerce-test-header-right-section">
        <a class="account-link header-link js-account-link" href="login.html">
          <span class="account-greeting js-account-greeting">Hello, sign in</span>
          <span class="account-text js-account-text">Account</span>
        </a>

        <a class="orders-link header-link" href="orders.html">
          <span class="returns-text">Returns</span>
          <span class="orders-text">& Orders</span>
        </a>

        <a class="cart-link header-link" href="checkout.html">
          <img class="cart-icon" src="images/icons/cart-icon.png">
          <div class="cart-quantity js-cart-quantity">0</div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>

    <div class="main">
      <div class="promo-banner">
        <div class="promo-content">
          <p class="promo-label">Deals of the Day</p>
          <h2 class="promo-title">Up to <span>50% off</span><br>top products</h2>
          <p class="promo-subtitle">Free shipping on orders over $25</p>
          <a href="#products" class="button-primary promo-cta">Shop Now</a>
        </div>
        <div class="promo-badges">
          <div class="promo-badge"><span class="promo-check">&#10003;</span> Free Shipping</div>
          <div class="promo-badge"><span class="promo-check">&#10003;</span> Easy Returns</div>
          <div class="promo-badge"><span class="promo-check">&#10003;</span> Secure Checkout</div>
        </div>
      </div>

      <section class="offers-section">
        <div class="offers-header">
          <div class="offers-header-left">
            <span class="offers-label">&#9889; Tiempo limitado</span>
            <h2 class="offers-title">Ofertas de Hoy</h2>
          </div>
          <div class="offers-header-right">
            <a href="#products" class="offers-view-all">Ver todos los productos</a>
            <div class="offers-nav">
              <button class="offers-btn js-offers-prev" aria-label="Anterior">&#8249;</button>
              <button class="offers-btn js-offers-next" aria-label="Siguiente">&#8250;</button>
            </div>
          </div>
        </div>
        <div class="offers-carousel-wrapper js-offers-wrapper">
          <div class="offers-carousel js-offers-carousel"></div>
        </div>
      </section>

      <div id="products" class="products-grid js-products-grid"></div>

      <p class="js-no-results no-results"></p>

      <div class="js-pagination pagination"></div>
    </div>

    <script src="scripts/carousel.js"></script>
    <script type="module" src="scripts/ecommerce-test.js"></script>
  </body>
</html>
