<!DOCTYPE html>
<html>
  <head>
    <title>Ecommerce Test - Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/shared/general.css">
    <link rel="stylesheet" href="styles/pages/login.css">
  </head>
  <body>
    <div class="login-page">
      <a href="index.html" class="login-logo-link">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="#5B6AD0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="3" y1="6" x2="21" y2="6" stroke="#5B6AD0" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 10a4 4 0 01-8 0" stroke="#5B6AD0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="login-logo-text">ecommerce<em>.test</em></span>
      </a>

      <div class="login-container">
        <h1 class="login-title">Create account</h1>

        <form class="js-register-form">
          <label class="login-label" for="name">Your name</label>
          <input
            class="login-input js-name"
            type="text"
            id="name"
            placeholder="First and last name"
            required
          >

          <label class="login-label" for="email">Email</label>
          <input
            class="login-input js-email"
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          >

          <label class="login-label" for="password">Password</label>
          <input
            class="login-input js-password"
            type="password"
            id="password"
            placeholder="At least 6 characters"
            required
          >

          <label class="login-label" for="confirm-password">Re-enter password</label>
          <input
            class="login-input js-confirm-password"
            type="password"
            id="confirm-password"
            placeholder="Re-enter your password"
            required
          >

          <p class="js-error-message login-error"></p>

          <button class="button-primary login-button" type="submit">
            Create your Ecommerce Test account
          </button>
        </form>
      </div>

      <div class="login-divider">
        <span class="login-divider-text">Already have an account?</span>
      </div>

      <div class="login-new-account">
        <a href="login.html" class="button-secondary login-button login-anchor-btn">
          Sign in
        </a>
      </div>
    </div>

    <script type="module" src="scripts/register.js"></script>
  </body>
</html>
